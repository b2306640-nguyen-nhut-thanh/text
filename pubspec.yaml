name: myshop
description: ''

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^17.3.0
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.1
  pocketbase: ^0.24.0
  image_picker: ^1.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.4.2
  flutter_local_notifications: ^22.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
    - family: Anton
      fonts:
        - asset: assets/fonts/Anton-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/app_icon.png"
  android_12:
    image: "assets/images/app_icon.png"
    icon_background_color: "#FFFFFF"
    color: "#FFFFFF"
  android: true
  ios: true
